		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}

		<style>
		#toc-overlay{position:fixed;left:20px;bottom:80px;z-index:9999;display:none}
		#toc-overlay.visible{display:block}
		#toc-overlay .toc-box{background:#fff;color:#000;padding:12px;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.2);max-height:70vh;overflow:auto;min-width:220px}
		#toc-overlay .toc-close{float:right;border:none;background:transparent;font-size:18px;cursor:pointer}
		#toc-overlay ul{list-style:none;padding:0;margin:0}
		#toc-overlay li{margin:6px 0}
		#toc-overlay a{color:inherit;text-decoration:none;cursor:pointer}
		@media (prefers-color-scheme: dark){#toc-overlay .toc-box{background:#222;color:#eee}}
		</style>

		<div id="toc-overlay" aria-hidden="true">
			<div class="toc-box">
				<button class="toc-close" aria-label="Fermer">×</button>
				<ul id="toc-list"></ul>
			</div>
		</div>

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
		</script>
