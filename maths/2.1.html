		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){

## Limite de fonction : définition informelle

Limite de $f(x)=2x$ quand $x$ tend vers 1 :
$$
\lim_{x\to 1}f(x)=2
$$
La limite est la valeur que prend $f$ en s'approchant arbitrairement de $x$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Limite de fonction : définition informelle

Dans beaucoup de cas
$$
\lim_{x\to a}f(x)=f(a)
$$
La limite peut être infinie :
$$
\lim_{x\to +\infty}x=+\infty
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Limite indéterminée

Pour $f(x)=\frac{1}{x}$, par la gauche
$$
\lim_{x\to 0^-}f(x)=-\infty
$$
et par la droite
$$
\lim_{x\to 0^+}f(x)=+\infty
$$
C'est pourquoi $\frac{1}{0}$ n'est pas défini.
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Dérivation

- Taux de variation instantanné
- Pente de la tangente en un point de la courbe

La dérivée de $f$ est notée $f'$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Interprétation 

- Dérivée (temporelle) de la position : vitesse
- Dérivée (temporelle) de la vitesse : accélération

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Définition formelle

La dérivée de $f$ en $x$ est donnée par (si la limite existe)
$$
f'(x)=\lim_{h\to 0}\frac{f(x+h)-f(x)}{h}
$$
Si la limite existe pour tout $x$, on dit que $f$ est dérivable. Pour $f(x)=ax+b$, on a
$$
f'(x)=\lim_{h\to 0}\frac{a(x+h)+b-ax-b}{h}=a
$$
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Propriétés

Soient $f$ et $g$ deux fonctions et $c\in\mathbb R$. On a 

1. $(f+g)'(x)=f'(x)+g'(x)$
2. $(cf)'(x)=cf'(x)$
3. $(fg)'(x)=f'(x)g(x)+f(x)g'(x)$
4. $(\frac{f}{g})'(x)=\frac{f'(x)g(x)-f(x)g'(x)}{g(x)^2}$
5. $(f^c)'(x)=cf'(x)f(x)^{c-1}$
6. $(f\circ g)'(x)=g'(x)f'(g(x))$, où $(f\circ g)(x)=f(g(x))$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Tangente en un point

Soit $f(x)$ une fonction et $\Gamma(t)=(t,f(t))$ sa courbe représentatrice (son graphique). La droite tangente à $\Gamma$ en $\Gamma(t)$ est donnée par
$$
T_{f,t}(x)=f'(t)(x-t)+f(t)
$$
Utilité : approximer une fonction localement

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : approximer $2.2^4$

Soit $f(x)=x^4$. On a $f'(x)=4x^3$, donc $f'(2)=32$.
La tangente à $f$ en $(2, f(2))$ est donnée par
$$
T_{f,t}(x)=f'(t)(x-t)+f(t)=32(x-2)+16\newline\Longrightarrow T_{f,t}(2.2)=32\times 0.2+16 = 22.4
$$
On déduit que $2.2^4\approx 22.4$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Trouver le minimum / maximum d'une fonction

Soit $f:\mathbb R \to \mathbb R$
- Si $f$ est dérivable, $x_0$ est un point critique de $f$ si $f'(x_0)=0$
- Un minimum / maximum de $f$ est un point critique

Si $f$ est seulement définie sur $[a,b]$, un minimum / maximum est soit un point critique, soit $f(a)$ ou $f(b)$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : trouver le minimum / maximum d'un polynôme de degré 2

$f(x)=ax^2+bx+c$, $a\,b,c\in\mathbb R$, $a\neq 0$. $f$ est dérivable et on a 
$$
f'(x)=0\Longleftrightarrow 2ax+b=0\Longleftrightarrow x=-\frac{b}{2a}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

Déterminer si c'est un minimum ou maximum : test de la dérivée seconde.
- Si $x_0$ est un point critique et $f''(x_0)>0$, $f(x_0)$ est un minimum
- Si $x_0$ est un point critique et $f''(x_0) < 0$, $f(x_0)$ est un maximum

Ici, $f''(x)=a$ donc $f(-\frac{b}{2a})$ est un minimum si $a>0$ et un maximum si $a< 0$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple 2 : minimiser la distance entre un point et un cercle

On considère le point $P=(a,b)$ et le cercle $(R \cos t, R \sin t)$ $t\in[0,2\pi]$. La distance entre un point du cercle et P est
$$
d(t)=\sqrt{(R\cos t-a)^2+(R\sin t-b)^2}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple 2 (suite)

On cherche les points critiques de $d$ :
$$
d'(t)=0\Longleftrightarrow -R\sin t(R\cos t-a)+R\cos t(R\sin t-b)=0\newline
\Longleftrightarrow R(b\cos t-a\sin t)=0 \Longleftrightarrow \tan t = \frac{b}{a}\newline
\Longleftrightarrow t = \arctan\left(\frac{b}{a}\right),~~a>0,
~~ t = \arctan\left(\frac{b}{a}\right)-\pi,a< 0
$$

</script></section></div>

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
		</script>
