		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){

## Méthode générale

- Racines : construire une suite de points convergeant vers la solution
- Équations différentielles : construire une approximation de la fonction
- Interpolation : « deviner » des valeurs à partir de mesures en faisant passer une courbe par un nuage de points

## Racines

Soit $f$ une fonction. Une racine de $f$ est un point $x_0\in\mathbb R$ tel que $f(x_0)=0$.

Deux méthodes faciles à mettre en place :
- Dichotomie / bissection
- Méthode de Newton

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Dichotomie / bissection

- Prérequis : connaître un intervalle sur lequel la fonction ne s'annule **qu'une seule fois**
- Notation : $f$ la fonction et $[a,b]$ l'intervalle sur lequel $f$ s'annule

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Dichotomie / bissection

Algorithme :
1. Évaluer $f$ au point milieu $\frac{a+b}{2}$.
2. Si $f(\frac{a+b}{2})$ est de même signe que $f(a)$, poser $a=\frac{a+b}{2}$. Sinon, poser $b=\frac{a+b}{2}$.
3. Revenir à l'étape 1 autant de fois de voulu.

La racine est approximativement $\frac{a+b}{2}$. L'erreur obtenue est inférieure à $\frac{b-a}{2^{n}}$, où $n$ est le nombre d'itérations.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : approximer $\sqrt 2$

$\sqrt 2$ est la racine positive de la fonction $f(x)=x^2-2$.
Si l'intervalle de base est $[1,1.5]$, on obtient après 5 itérations $\sqrt 2\approx 1.4140625$ (erreur inférieure à 0.001).

<img src="../assets/img/maths/Bissection.gif" width = "400px">

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Méthode de Newton

- Prérequis : connaître un point proche de la racine (par rapport aux autres) et la dérivée*
- Notation : $f$ la fonction et $x_0$ le point initial

*Si la dérivée est inconnue, on peut l'approximer, avec $h$ très petit, par
$$
f'(x)\approx \frac{f(x+h)-f(x)}{h}.
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Méthode de Newton

Suite à construire :
$$
x_{i+1}=x_i-\frac{f(x_i)}{f'(x_i)}.
$$
$(x_i)$ converge (sous certaines conditions) vers une racine de $f$. Il faut choisir judicieusement le point initial.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : adapter la méthode de Newton en python ou C++

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Résolutions numériques d'équations différentielles

- Objectif : construire une approximation de la fonction sur un intervalle
- Méthode : passer d'une équation différentielle à une relation de récurrence

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Résolutions numériques d'équations différentielles

Comment faire pour $y^{(n)}=F(x,y,y',...,y^{(n-1)})$ ? On utilise l'approximation :
$$
f'(x)\approx\frac{f(x+h)-f(x)}{h}
$$
On peut construire des approximations de $f^{(k)}(x)$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Approximation de $f^{(k)}(x)$

$$
f''(x)\approx \frac{f'(x+h)-f'(x)}{h}
$$
$$
f'''(x)\approx \frac{f''(x+h)-f''(x)}{h}
$$
C'est similaire pour les dérivées d'ordre supérieures.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple

On considère l'équation différentielle
$$
y''-2xy'+\sin x=0,~~y(0)=1,y'(0)=-1.
$$
On note $y_0=y(0)$ et $y_n=y(nh)$, où $h>0$. Ainsi,
$$
y_n'=\frac{y_{n+1}-y_n}{h}\newline
y_n''=\frac{y_{n+1}'-y_{n}'}{h}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple

L'idée est de construire deux suites, une approximant $y$, l'autre $y'$.
$$
y_{n+1}=y_n+hy_n'\newline
y_{n+1}'=y_n'+h(2xy_n'+\sin x)
$$

Pour $y^{(n)}=F(x,y,y',...,y^{(n-1)})$, on exprime $y,...,y^{(n-2)}$ comme la première équation et $y^{(n-1)}$ comme la deuxième.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exercice

Écrire les relations de récurrence pour l'équation différentielle suivante :
$$
3xy'''-\cos(x)(y')^2+\frac{y}{x}+1=0.
$$

Écrire un code Python / C++ approximant la fonction sur $[1,3]$ avec $h=10^{-4}$ et $y(1)=y'(1)=y''(1)=1$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Solution

$$
y_{n+1}=y_n+hy_n'\newline
y_{n+1}'=y_n'+hy_n''\newline
y_{n+1}''=y_n''+h\frac{\cos(x)(y_n')^2-\frac{y_n}{x}}{3x}\newline
y_0=1,
~~y_0'=1,
~~y_0''=1
$$
Note : $x=nh$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Interpolation

Deux méthodes faciles à mettre en place
- Interpolation linéaire par morceaux
- Interpolation de Lagrange

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Interpolation linéaire par morceaux

- Méthode : joindre des points par des segments
- Notation : $(x_1,y_1),...,(x_n,y_n)$ des points tels que $x_1<...< x_n$
Il suffit de trouver l'équation de la droite passant par $(x_i,y_i)$ et $(x_{i+1}, y_{i+1})$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Déterminer les droites

- La pente est $a_i=\frac{y_{i+1}-y_i}{x_{i+1}-x_i}$
- L'ordonnée à l'origine est $y_i-a_ix_i$
L'interpolation entre sur $[x_i,x_{i+1}]$ est donnée par
$$
i(x)=a_i(x-x_i) + y_i
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exercice

Déterminer l'interpolation linéaire par morceaux donnée par les points
$$
(0,0),~~
(0.1, 0.01),~~
(0.3, 0.09),~~
(0.5, 0.25),~~
(0.7, 0.49),~~
(0.9, 0.81).
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Interpolation de Lagrange

- Méthode : joindre des $n+1$ points par l'unique polynome de degré $n$
- Notation : $(x_1,y_1),...,(x_{n+1},y_{n+1})$ des points tels que $x_1<...< x_n$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Déterminer le polynome

Soit $P(x)$ le polynome à déterminer. On veut que $P(x_i)=y_i$. Idée : décomposer $P(x)$ en une somme
$$
P(x)=\sum_{i=1}^{n+1}P_i(x)
$$
tel que $P_i(x_j)=y_i$ si $i=j$ et $P(x_j)=0$ sinon.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Déterminer le polynome

$$
P_i(x)= y_i\frac{(x-x_1)...(x-x_{i-1})(x-x_{i+1})...(x-x_{n+1})}{(x_i-x_1)...(x_i-x_{i-1})(x_i-x_{i+1})...(x_i-x_{n+1})}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple

On considère les points $(1, 0)$, $(3, 6)$ et $(4,-2)$. L'interpolation de Lagrange est donnée par
$$
P_1(x)=0,~~
P_2(x)=6\frac{(x-1)(x-4)}{(3-1)(3-4)},~~
P_2(x)=-2\frac{(x-1)(x-3)}{(4-1)(4-3)}
$$
Ainsi
$$
P(x)=-\frac{11}{3}x^2+\frac{53}{3}x-14
$$

</script></section></div>
