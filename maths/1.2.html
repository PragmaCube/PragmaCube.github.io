		var forgetPop = true;

			}

			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

## Vecteurs

Un vecteur est un objet mathématique constitué de
- Une **direction** (une droite dans un plan ou dans l'espace)
- Un **sens** (les deux sens de parcours de la droite)
- Une **norme** (longueur)

En physique, un vecteur possède en plus un **point d'application**. On utilise une flèche pour représenter un vecteur.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Application et représentation

- Peut représenter une vitesse, une force ou un déplacement
- Le vecteur du point $A$ au point $B$ est noté $\overrightarrow{AB}$

<img src = "../assets/img/maths/vecteur.png">

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Relation de Chasles

On peut additionner des vecteurs en utilisant la relation $\overrightarrow{AB}+\overrightarrow{BC}=\overrightarrow{AC}$.
De plus $\overrightarrow{AB}=-\overrightarrow{BA}$.

<span style="display:inlign-block">
	<img src = "../assets/img/maths/chasles.png" width="400">
	<img src = "../assets/img/maths/vecteurs.png" width="400">
</span>

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Multiplication par un scalaire (nombre) et norme

- Norme : distance entre les deux points définissant le vecteur. On note $||\overrightarrow{AB}||$
- Multiplication par un scalaire : vecteur de même direction, sens, point de base et de norme $||\lambda\overrightarrow{AB}||=\lambda||\overrightarrow{AB}||$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Coordonnées

Il est plus facile de manipuler des nombres que des points.

- On suppose que le point de base est l'origine $O=(0,0)$
- Les coordonnées de $\overrightarrow{OA}$ sont celles du point $A$

$$
A = (1, 2)\Longrightarrow \overrightarrow{OA}=\begin{pmatrix}1\newline 2
\end{pmatrix}
$$


</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Addition et multiplication de vecteurs

- Addition : on additionne les coordonnées terme à terme
- Multiplication : on multiplie chaque coordonnée

$$
\overrightarrow{OA}=\begin{pmatrix}x_a\newline y_a
\end{pmatrix},~~ \overrightarrow{OB}=\begin{pmatrix}y_b\newline y_b\end{pmatrix}
$$
$$
\Longrightarrow \overrightarrow{OA}+\overrightarrow{OB}=\begin{pmatrix}x_a+x_b\newline y_a+y_b\end{pmatrix},~~\lambda \overrightarrow{OA}=\begin{pmatrix}\lambda x_a \newline \lambda y_a\end{pmatrix}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Norme d'un vecteur

$$
\overrightarrow{OA}=\begin{pmatrix}x_a\newline y_a
\end{pmatrix}~~ \Longrightarrow ||\overrightarrow{OA}||=\sqrt{x_a^2+y_a^2}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

Dans la suite, on note un vecteur par une seule lettre :

$$
\overrightarrow{u},~~\overrightarrow{v},
~~\overrightarrow{w}...
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Produit scalaire 

- Mesurer à quel point deux vecteurs sont parallèles / orthogonaux (perpendiculaires)
- Deux définitions équivalentes ($0\leq \theta\leq \pi$ est l'angle entre $\overrightarrow{u}$ et $\overrightarrow{v}$)

$$
\overrightarrow{u} \cdot \overrightarrow{v} = ||\overrightarrow{u}|| ||\overrightarrow{v}|| \cos \theta=x_u x_v+y_u y_v
$$


</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}

		<div id="toc-overlay" aria-hidden="true">

				<ul id="toc-list"></ul>
			</div>

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
		</script>
