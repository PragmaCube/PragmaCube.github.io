		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){

			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }

			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

## Objectifs

<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Courbes

- $\Gamma(t)=(x(t),y(t))$ est une courbe du plan si $x$ et $y$ sont des fonctions de $t$
- Pour simplifier : supposer que $x$ et $y$ sont lisses (dérivables une infinité de fois)

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple 

- Ellispe : $\Gamma(t)=(a \cos t, b \sin t)$
- Droite : $\Gamma(t) =(at + b, ct + d)$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Vecteur tangent

$$
\Gamma'(t)=(x'(t),y'(t))
$$

est le vecteur tangent à $\Gamma$ en tout point.
Si $\Gamma(t)$ est la position d'un objet au temps $t$, $\Gamma'(t)$ est sa vitesse et $\Gamma''(t)$ son accélération.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Longueur d'arc (longueur de la courbe)

$$
\int_a^b ||\Gamma'(t)||dt
$$
est la longueur de la courbe entre les points $\Gamma(a)$ et $\Gamma(b)$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : chaînette (câble suspendu, soumis à son poids)

<img src="../assets/img/maths/courbes.gif" style="width:700px">

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

Les équations paramétriques, pour $a>0$ une constante en mètres, sont
$$
\begin{cases}
x(t)&=a\ln(t)\newline
y(t)&=\frac{a}{2}(t+\frac{1}{t})
\end{cases}
$$
On suppose que la chaîne est suspendue à deux mètres du sol. Il faut résoudre $y(t)=2$.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

$$
y(t)=2\Longleftrightarrow t^2-\frac{4}{a}t+1=0
$$
Les deux solutions sont
$$
t_-=\frac{2-\sqrt{4-a^2}}{a},~~t_+=\frac{2+\sqrt{4-a^2}}{a}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

La longueur d'arc de la chaînette est
$$
\int_{t_-}^{t_+}||\Gamma'(t)||dt=\int_{t_-}^{t_+}\sqrt{x'(t)^2+y'(t)^2}dt=\int_{t_-}^{t_+}\sqrt{\frac{a^2}{t^2}+\frac{a^2}{4}\left(1-\frac{1}{t^2}\right)^2}dt
$$
$$
= \int_{t_-}^{t_+}a\sqrt{\frac{1}{4t^4}+\frac{1}{2t^2}+\frac{1}{4}}dt=\int_{t_-}^{t_+}\frac{a}{2}\left|\frac{1}{t^2}+1\right|dt
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)
$$
=\frac{a}{2}\left(t_+-t_-+\frac{1}{t_-}-\frac{1}{t_+}\right)=2\sqrt{4-a^2}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Remarque sur l'exemple

Si les extrémités sont fixées à différentes hauteurs, on obtient $t_+$ et $t_-$ en résolvant
$$
\begin{cases}
|x(t_+)-x(t_-)|&=l,\newline
|y(t_+)-y(t_-)|&=h
\end{cases}
$$
où $l$ et $h$ sont connues (espacements horizontal et vertical des extrémités).

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Travail d'une force le long d'une courbe

Le long d'un déplacement rectiligne $\overrightarrow{AB}$, le travail de $\overrightarrow{F}$ est $W=\overrightarrow{F}\cdot \overrightarrow{AB}$

Le long d'une courbe $\Gamma$, le travail entre $\Gamma(b)$ et $\Gamma(a)$ est
$$
W=\int_a^b \overrightarrow{F}\cdot \overrightarrow{\Gamma'(t)}dt
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : boule roulant sur un sol en arc de cercle

<img src="../assets/img/maths/arcdecercle.png" style="width:700px">

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

La boule est de masse $m$
- Les frottements sont négligés
- La réaction normale n'a aucun impact sur le mouvement
- Le poids est donné par
$$
\overrightarrow{P}=\begin{pmatrix}0\newline
mg\end{pmatrix}
$$
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

La trajectoire suivie par le centre de masse est
$$
\Gamma(t)=((R-r)\cos t,(R-r)\sin t),~~-\pi\leq t\leq \alpha-\frac{\pi}{2}
$$
Ainsi,
$$
\int_{-\pi}^{\alpha-\frac{\pi}{2}}\overrightarrow{P}\cdot \Gamma'(t)dt=\int_{-\pi}^{\alpha-\frac{\pi}{2}}mg(R-r)\cos tdt=mg(R-r)\sin\left(\alpha-\frac{\pi}{2}\right)
$$


</script></section></div>

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
		</script>
