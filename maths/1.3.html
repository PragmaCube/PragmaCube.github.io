		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}

					let stateCheck = setInterval(() => {

					}, 250);

			}
	};

## Droites

Une droite du plan est déteminée par l'équation $ax+by=c$
- $-\frac{a}{b}$ est la **pente** de la droite (si $b\neq 0$)
- $\frac{c}{b}$ est l'**ordonnée à l'origine** de la droite (si $b \neq 0$)

Si $b=0$, la droite est verticale.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : déterminer l'unique droite passant par $A$ et $B$

$$
A = (x_A, y_A),~~ B=(x_B, y_B)\Longrightarrow
\begin{cases}
by_A = c - a x_A \newline
by_B = c - a x_B
\end{cases}
$$
Si $b=0$, on peut supposer $a=1$ pour une droite bien définie donc
$$
\Longrightarrow x_A = c = x_B
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite) : 

Si $b\neq 0$ et $A\neq B$
$$
\frac{a}{b}=\frac{y_B-y_A}{x_A-x_B},~~c=ax_A+by_A
$$
L'équation de la droite se réécrit
$$
y = -\frac{a}{b}x+\frac{c}{b}=\frac{y_B-y_A}{x_B-x_A}x+\frac{y_B-y_A}{x_A-x_B}x_A+y_A
$$
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Droites (suite)

On peut aussi utiliser les équations paramétriques $\overrightarrow{\textbf{x}}(t)=p+t\overrightarrow{v}$
- $p$ est un point de base
- $\overrightarrow{v}$ est le vecteur directeur de la droite
- $t\in\mathbb{R}$

Pour $p=(p_x,p_y)$, on a 
$$
\overrightarrow{v}=
\begin{pmatrix}
v_x\newline v_y
\end{pmatrix},~~
\overrightarrow{\textbf{x}}(t)=\begin{pmatrix}
x(t)\newline y(t)
\end{pmatrix}~~\Longrightarrow \begin{cases}
x(t)&=p_x+tv_x\newline y(t)&=p_y+tv_y
\end{cases}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Droites (suites)

- L'ordonnée à l'origine est donnée par $t_0$ tel que $x(t_0)=0$
- La pente de la droite est donnée par $\frac{v_y}{v_x}$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : trouver les équations paramétriques de la droite $3x-4y=1$

$3x-4y=1\Longleftrightarrow y=\frac{3}{4}x-\frac{1}{4}$. Pour $x=0$, on a $y=-\frac{1}{4}$. Les équations paramétriques sont donc
$$
\begin{cases}
x(t)&=t\newline
y(t)&=\frac{3}{4}t-\frac{1}{4}
\end{cases}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Cercles

Un cercle est déterminé par
- Un centre $C=(x_C,y_C)$
- Un rayon $R>0$

Son équation dans un plan est
$$(x-x_C)^2+(y-y_C)^2=R^2$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Cercles (suite)

Il est parfois plus facile d'utiliser les équations paramétriques
$$
\begin{cases}
x(t)&=R\cos t + x_C\newline
y(t)&=R\sin t + y_C
\end{cases},~~t\in[0,2\pi]
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Intersection entre droites et cercles

Il y a 3 possibilités
- Pas d'intersection
- Une intersection (la droite est tangente au cercle)
- Deux intersections

Il suffit de résoudre le système donné en imposant la condition $\overrightarrow{\textbf{x}_C}(t)=\overrightarrow{\textbf{x}_D}(t)$ où $\overrightarrow{\textbf{x}_C}$ est l'équation pour le cercle et $\overrightarrow{\textbf{x}_D}$ pour la droite.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : trouver la distance entre un point $P$ et un cercle de centre $C$ et de rayon $R$

Méthode
- Trouver les équations paramétriques de $(PC)$
- Trouver les deux points $P_I$ et $P_I'$ d'intersection avec le cercle
- Prendre la distance minimale entre $P$-$P_I$ et $P$-$P_I'$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite) :

Les équations paramétriques de $(PC)$ sont
\begin{cases}
x(t)=(x_C-x_P)t+x_C\newline
y(t)=(y_C-y_P)t+y_C
\end{cases}
Le système à résoudre est
$$\begin{cases}
R\cos t + x_C&=(x_C-x_P)t+x_C\newline
R\sin t + y_C&=(y_C-y_P)t+y_C
\end{cases}$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite) :

Le système est équivalent à (somme des carrés des deux équations) 
$$
R^2 = t^2\left((x_C-x_P)^2+(y_C-y_P)^2\right)
$$
Les deux points d'intersection sont donnés par 
$$
t_+=\frac{R}{||\overrightarrow{PC}||},~~t_-=-\frac{R}{||\overrightarrow{PC}||},
~~ ||\overrightarrow{PC}||=\sqrt{(x_C-x_P)^2+(y_C-y_P)^2}
$$
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite) :

La distance entre $P$ et le cercle est donnée par 

$$
\min\left(\sqrt{(x_P-x(t_+))^2+(y_P-y(t_+))^2},\sqrt{(x_P-x(t_-))^2+(y_P-y(t_-))^2}\right)
$$


</script></section></div>

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

	if(isLight){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}

			</div>

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
		</script>
