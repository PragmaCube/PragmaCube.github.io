			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {

<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Calculer l'aire sous une courbe

Rectangle donné par les points $(x_i,0)$, $(x_{i+1},0)$, $(x_{i+1},f(x_{i+1}))$ et $(x_i,f(x_i))$, avec $x_i< x_{i+1}$

- Largeur : $x_{i+1}-x_i$
- Hauteur : $f(x_{i})$ ou $f(x_{i+1})$ (en fonction de la convention)

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Calculer l'aire sous une courbe

L'aire sous la courbe est environ la somme des aires des rectangles. Pour $a=x_0< x_2 <... < x_n =b$, l'aire sous la fonction $f$ est

$\mathcal A(f)=f(x_1)(x_1-x_0)+f(x_2)(x_2-x_1)+...+f(x_n)(x_n-x_{n-1})\newline=\sum_{i=1}^n f(x_i)(x_{i}-x_{i-1})$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Calculer l'aire sous une courbe

- Diminuer l'espacement entre les $x_i\Longrightarrow $ précision augmente
- L'écart infinitésimal se note $dx$
- La somme devient « continue »
$$
\int_a^b f(x)dx~~\text{est l'intégrale de $f$ sur [a,b]}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Comment calculer une intégrale ?

Soit $f:[a,b]\to\mathbb R$ une fonction dérivable. Alors
$$
\int_a^bf'(x)dx=f(b)-f(a).
$$
C'est le théorème fondamental du calcul intégral.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Comment calculer une intégrale ?

En particulier,
$$
\int_a^xf'(t)dt=f(x)-f(a).
$$
L'intégrale renverse la dérivée.
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple : calculer l'intégrale de $f(x)=3x-1$ entre $1$ et $4$

On pose $g'(x)=f(x)=3x-1$.
- Quelle fonction donne $3x$ en la dérivant ?
$$
3x=3\frac{2x}{2}=\frac{3}{2}2x~~\text{donc c'est }\frac{3}{2}x^2
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

- Quelle fonction donne $3x$ en la dérivant ?
$$- 1= - 1 \times 1~~\text{c'est } - x
$$
On déduit que $g(x)=\frac{3}{2}x^2-x+c$, $c\in\mathbb R$.
- Pourquoi $+c$ ? Une infinité de fonctions ont comme dérivée $g'(x)$, car dériver une constante donne 0

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemple (suite)

$$
\int_1^4 g'(x)dx=g(4)-g(1)=\frac{3}{2}4^2-4+c-\left(\frac{3}{2}\times 1-1+c\right)\newline
= \frac{45}{3}-3=12
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Gadget plus pratique : les primitives

- $F$ est une primitive de $f$ si $F'=f$
- $F+C$, $\forall C\in\mathbb R$ est aussi une primitive de $f$
Pour calculer une intégrale, il suffit de calculer
$$
\int_a^b f(x)dx=F(b)-F(a).
$$
Connaître une primitive est donc suffisant.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Propriétés

Soient $f,g$ deux fonctions et $k,c\in\mathbb R$. On a
- $\int_a^b f(x)+g(x)dx=\int_a^bf(x)dx+\int_a^b g(x)$
- $\int_a^b kf(x)dx = k\int_a^bf(x)dx$
- $\int_a^b f(x)dx+\int_a^cf(x)dx=\int_a^c f(x)dx$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Techniques d'intégrations
Il existe plusieurs techniques d'intégration (pas présentées ici), notamment
$$
\int_a^b g'(x)f(g(x))dx=\int_{g(a)}^{g(b)}f(x)dx~~\text{par substitution}\newline
\int_a^b f'(x)g(x)dx=f(b)g(b)
-f(a)g(a)
-\int_a^bf(x)g'(x)dx
~~\text{par parties}
$$

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Équations différentielles

- Inconnue : fonction (pas une variable !)
- En général, difficiles à résoudre
- Utilité : trouver une trajectoire à partir du bilan des forces (2e loi de Newton)

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Équations différentielles

Soit $y=f(x)$ une fonction de dérivées $y', y'',...,y^{(n)}$, où $y^{(n)}$ est la dérivée d'ordre $n$. Une équation différentielle est une équation de la forme
$$
g(x,y,y',...,y^{(n)})=0
$$
où $g$ est une fonction.

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Résolution d'équations différentielles

- Beaucoup de techniques : équations linéaires, facteur intégrant, « deviner la solution »...
- En robotique :
	- Soit les équations sont assez faciles (il suffit d'intégrer)
 	- Soit les équations n'ont pas de solutions simples (il faut une solution numérique)

</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 700px; width: 960px; min-height: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center" absolute="true">

## Exemples

$$
y'=h(x),~~\text{est « facile » à résoudre (intégrer }h\text{)}
$$
Balistique avec frottements à hautes vitesses : il faut résoudre le système
$$
\begin{cases}
mv_x'=-k\sqrt{v_x^2+v_y^2}v_x\newline
mv_y'=-k\sqrt{v_x^2+v_y^2}v_y + mg
\end{cases}
$$
qui pas de solutions explicites.

</script></section></div>

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
	var isLight = isLight(bgColor);

		<script>
		(function(){
			function buildTOC(){
				var list = document.getElementById('toc-list');
				if(!list) return;
				list.innerHTML = '';
				var slides = document.querySelectorAll('.reveal .slides > section');
				slides.forEach(function(section, i){
					var contentDiv = section.querySelector('div[id]');
					if(!contentDiv) return;
					var id = contentDiv.id;
					var titleEl = contentDiv.querySelector('h1,h2,h3,h4,strong');
					var title = (titleEl && titleEl.innerText.trim()) || id;
					var li = document.createElement('li');
					var a = document.createElement('a');
					a.href = 'javascript:void(0)';
					a.textContent = String(title).charAt(0).toUpperCase() + String(title).toLowerCase().slice(1);
					a.addEventListener('click', function(e){
						Reveal.slide(i);
						toggleTOC();
					});
					li.appendChild(a);
					list.appendChild(li);
				});
			}

			window.toggleTOC = function(){
				var overlay = document.getElementById('toc-overlay');
				if(!overlay) return;
				overlay.classList.toggle('visible');
				overlay.setAttribute('aria-hidden', !overlay.classList.contains('visible'));
				if(overlay.classList.contains('visible')) buildTOC();
			};

			document.addEventListener('DOMContentLoaded', function(){
				var closeBtn = document.querySelector('#toc-overlay .toc-close');
				if(closeBtn) closeBtn.addEventListener('click', toggleTOC);
			});
		})();
